name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder for containerized artifact pipeline
        run: |
          echo "Placeholder: the containerized artifact pipeline lands at M2"
          echo "(DESIGN.md §9 revision — build logistics & CI milestone)."
          echo "See DESIGN.md milestones and the build/ layout."
          exit 0

  # M0 item 6N: run the demo hello-world -> PDF smoke ONLY when the dist/
  # artifacts are present in the checkout. dist/ is git-ignored and not
  # committed, so on a stock checkout this job skips every real step and stays
  # green. When M2 wires artifact build/download into CI (the recorded
  # deferral), the guard below flips to `present=true` and the smoke runs.
  demo-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: guard
        name: Detect dist/ artifacts
        run: |
          if [ -f dist/busytex.wasm ] \
             && [ -f dist/busytex.js ] \
             && [ -f dist/busytex_worker.js ] \
             && [ -f dist/busytex_pipeline.js ] \
             && [ -f dist/texlive-basic.js ] \
             && [ -f dist/texlive-basic.data ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "dist/ artifacts present -> running demo smoke."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "dist/ artifacts absent -> skipping demo smoke (full CI build lands at M2)."
          fi

      - if: steps.guard.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - if: steps.guard.outputs.present == 'true'
        name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - if: steps.guard.outputs.present == 'true'
        name: Install Chromium (with OS deps)
        working-directory: demo
        run: npx playwright install --with-deps chromium

      - if: steps.guard.outputs.present == 'true'
        name: Run Playwright hello-world PDF smoke
        working-directory: demo
        run: npm test

      - if: ${{ !cancelled() && steps.guard.outputs.present == 'true' }}
        name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: demo/playwright-report
          if-no-files-found: ignore
