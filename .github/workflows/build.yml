name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Placeholder for containerized artifact pipeline
        run: |
          echo "Placeholder: the containerized artifact pipeline lands at M3"
          echo "(DESIGN.md §9 revision — build logistics & CI milestone)."
          echo "See DESIGN.md milestones and the build/ layout."
          exit 0

  # Demo -> PDF smoke (M1 item 9: the page drives the `wasmtex` RUNTIME, not the
  # vendored glue). Runs ONLY when the dist/ engine artifacts are present in the
  # checkout. dist/ is git-ignored and not committed, so on a stock checkout this
  # job skips every real step and stays green. When M3 wires artifact
  # build/download into CI (the recorded deferral), the guard flips to
  # `present=true`, the runtime is built, and the smoke runs.
  demo-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: guard
        name: Detect dist/ artifacts
        run: |
          if [ -f dist/busytex.wasm ] \
             && [ -f dist/busytex.js ] \
             && [ -f dist/texlive-basic.js ] \
             && [ -f dist/texlive-basic.data ] \
             && [ -f dist/assets.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "dist/ artifacts present -> building runtime + running demo smoke."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "dist/ artifacts absent -> skipping demo smoke (full CI build lands at M3)."
          fi

      - if: steps.guard.outputs.present == 'true'
        uses: actions/setup-node@v5
        with:
          # Node 24 matches runtime/package.json `engines` and runtime-tests.yml.
          node-version: 24

      # The demo loads runtime/dist/{src,worker.js}, which are git-ignored build
      # products — build them here before the smoke (the demo's own `pretest`
      # also builds, so a manual `npm test` works locally; this makes the runtime
      # build an explicit, independently-reported CI step).
      - if: steps.guard.outputs.present == 'true'
        name: Install runtime dependencies (clean, from committed lockfile)
        working-directory: runtime
        run: npm ci

      - if: steps.guard.outputs.present == 'true'
        name: Build the runtime (ESM client + worker bundle)
        working-directory: runtime
        run: npm run build

      - if: steps.guard.outputs.present == 'true'
        name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - if: steps.guard.outputs.present == 'true'
        name: Install Chromium (with OS deps)
        working-directory: demo
        run: npx playwright install --with-deps chromium

      - if: steps.guard.outputs.present == 'true'
        name: Run Playwright hello-world PDF smoke
        working-directory: demo
        run: npm test

      - if: ${{ !cancelled() && steps.guard.outputs.present == 'true' }}
        name: Upload Playwright report
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: demo/playwright-report
          if-no-files-found: ignore

  # Conformance seed corpus (M2 item 7: the DESIGN.md §8 corpus gate). Drives the
  # PUBLIC wasmtex runtime (createTypesetter, via the bundled Node harness)
  # against the dist/ engine artifacts for every corpus entry, asserting exit
  # code / page count / text snippets / diagnostics shape. Like demo-smoke, it
  # runs ONLY when the git-ignored dist/ artifacts are present; on a stock
  # checkout run.mjs itself green-skips, so this job stays green. M3 flips the
  # guard to build/download artifacts in CI.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: guard
        name: Detect dist/ artifacts
        run: |
          if [ -f dist/busytex.wasm ] \
             && [ -f dist/busytex.js ] \
             && [ -f dist/texlive-basic.js ] \
             && [ -f dist/texlive-basic.data ] \
             && [ -f dist/assets.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "dist/ artifacts present -> building runtime + running conformance corpus."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "dist/ artifacts absent -> skipping conformance corpus (full CI build lands at M3)."
          fi

      - if: steps.guard.outputs.present == 'true'
        uses: actions/setup-node@v5
        with:
          # Node 24 matches runtime/package.json `engines` and the other jobs.
          node-version: 24

      # The runner imports runtime/dist/node-harness.mjs (a git-ignored build
      # product), so build the runtime first — the same explicit step demo-smoke
      # uses. conformance/ has no external deps, so no npm ci there.
      - if: steps.guard.outputs.present == 'true'
        name: Install runtime dependencies (clean, from committed lockfile)
        working-directory: runtime
        run: npm ci

      - if: steps.guard.outputs.present == 'true'
        name: Build the runtime (ESM client + worker + node harness)
        working-directory: runtime
        run: npm run build

      - if: steps.guard.outputs.present == 'true'
        name: Run the conformance seed corpus
        run: node conformance/run.mjs
