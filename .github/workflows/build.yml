# WasmTeX top-level CI stub.
#
# The FUNCTIONAL GATES that drive the runtime against real engine artifacts —
# the conformance seed corpus (DESIGN.md §8) and the demo->PDF Playwright smoke —
# live in .github/workflows/artifacts-build.yml. There they run as
# `needs: artifacts-build` jobs that DOWNLOAD the dist/ that workflow builds and
# uploads in CI, then execute against it. That is their real, active home, and the
# M3 functional-acceptance-in-CI piece (DESIGN.md §6.1/§9, amended 2026-07-23:
# byte-repro dropped, functional gates are the release bar).
#
# Until M3 item 7 slice B2 (7b2, 2026-07-23) this file carried GUARDED copies of
# those two jobs (`demo-smoke` + `conformance`) that detected a local dist/ and
# green-skipped because dist/ is git-ignored and never present in a stock checkout.
# Those stubs are RETIRED: the gates now consume the CI-built artifact in
# artifacts-build.yml rather than perpetually green-skipping here. Gate logic is
# NOT duplicated across the two files.
#
# Accepted follow-up (not yet built — see docs/plans/M3-journal.md item 7, slice
# B2): per-PR integration coverage — build.yml gates that DOWNLOAD the latest
# artifacts-build artifact so runtime/demo/conformance PRs that DON'T touch the
# build inputs still get an integration run. Runtime unit tests (runtime-tests.yml)
# cover those PRs for now.
name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Runs the zero-dep unit tests for build-side TOOLING (build/bundles/ — the M4
  # tlpdb parser + tier resolver; future build/ tooling lands here too). These are
  # node:test suites with no npm deps; the real-tlpdb groups skip GREEN when the
  # ISO-staged tlpdb is absent (as it is on a stock CI checkout), so only the
  # synthetic invariants run here — enough to catch a parser/resolver regression.
  # The canonical containerized artifact pipeline + functional gates live in
  # .github/workflows/artifacts-build.yml (M3 item 7). This job also keeps a
  # `build` status present on every push/PR.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: build/bundles + build/manifest + conformance tooling unit tests (node --test)
        run: node --test build/bundles/tlpdb.test.mjs build/bundles/resolve.test.mjs build/bundles/gen-profile.test.mjs build/bundles/stage-tiers.test.mjs build/manifest/gen-assets.test.mjs conformance/pdf-probe.test.mjs
