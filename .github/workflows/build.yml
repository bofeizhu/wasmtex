name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder for containerized artifact pipeline
        run: |
          echo "Placeholder: the containerized artifact pipeline lands at M3"
          echo "(DESIGN.md §9 revision — build logistics & CI milestone)."
          echo "See DESIGN.md milestones and the build/ layout."
          exit 0

  # Demo -> PDF smoke (M1 item 9: the page drives the `wasmtex` RUNTIME, not the
  # vendored glue). Runs ONLY when the dist/ engine artifacts are present in the
  # checkout. dist/ is git-ignored and not committed, so on a stock checkout this
  # job skips every real step and stays green. When M3 wires artifact
  # build/download into CI (the recorded deferral), the guard flips to
  # `present=true`, the runtime is built, and the smoke runs.
  demo-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: guard
        name: Detect dist/ artifacts
        run: |
          if [ -f dist/busytex.wasm ] \
             && [ -f dist/busytex.js ] \
             && [ -f dist/busytex_worker.js ] \
             && [ -f dist/busytex_pipeline.js ] \
             && [ -f dist/texlive-basic.js ] \
             && [ -f dist/texlive-basic.data ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "dist/ artifacts present -> building runtime + running demo smoke."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "dist/ artifacts absent -> skipping demo smoke (full CI build lands at M3)."
          fi

      - if: steps.guard.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          # Node 24 matches runtime/package.json `engines` and runtime-tests.yml.
          node-version: 24

      # The demo loads runtime/dist/{src,worker.js}, which are git-ignored build
      # products — build them here before the smoke (the demo's own `pretest`
      # also builds, so a manual `npm test` works locally; this makes the runtime
      # build an explicit, independently-reported CI step).
      - if: steps.guard.outputs.present == 'true'
        name: Install runtime dependencies (clean, from committed lockfile)
        working-directory: runtime
        run: npm ci

      - if: steps.guard.outputs.present == 'true'
        name: Build the runtime (ESM client + worker bundle)
        working-directory: runtime
        run: npm run build

      - if: steps.guard.outputs.present == 'true'
        name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - if: steps.guard.outputs.present == 'true'
        name: Install Chromium (with OS deps)
        working-directory: demo
        run: npx playwright install --with-deps chromium

      - if: steps.guard.outputs.present == 'true'
        name: Run Playwright hello-world PDF smoke
        working-directory: demo
        run: npm test

      - if: ${{ !cancelled() && steps.guard.outputs.present == 'true' }}
        name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: demo/playwright-report
          if-no-files-found: ignore
