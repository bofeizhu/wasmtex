name: license-audit

on:
  push:
    branches: [main]
  pull_request:

# Provenance / license audit (DESIGN.md §2 + §7). The checks live in
# build/audit/license-audit.sh so the audit is one command locally and in CI;
# this job is a thin wrapper. The script needs only git + coreutils (already on
# the runner), so there is nothing to install.
jobs:
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run license / provenance audit
        run: bash build/audit/license-audit.sh
