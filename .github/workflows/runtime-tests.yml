name: runtime-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  runtime-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run runtime tests if present
        run: |
          if [ -f runtime/package.json ]; then
            cd runtime
            npm ci
            npm test
          else
            echo "runtime not yet implemented - skipping"
          fi
