name: runtime-tests

on:
  push:
    branches: [main]
  pull_request:

# Node 24 matches the maintainer's dev host (docs/native-host.md) so local and
# CI results are comparable, and runtime/package.json `engines` pins the same
# major. Hard, reproducible toolchain pinning is an M3 concern (see M1 plan);
# here we track the major via actions/setup-node.
jobs:
  runtime-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: runtime/package-lock.json
      - name: Install (clean, from committed lockfile)
        run: npm ci
      - name: Typecheck (src + worker + test)
        run: npm run typecheck
      - name: Build (library + worker bundle must stay packable)
        run: npm run build
      - name: Unit tests
        run: npm test
