#   Not derived from any third-party source. The URLs, commits and digests
#   recorded below point at upstream busytex (MIT) and official TeX Live / TUG
#   distribution channels; the source *contents* they name carry their own
#   licenses (see THIRD_PARTY_NOTICES.md and DESIGN.md 2/7).
#
# WasmTeX pinned external inputs (M0 item 2).
# =============================================================================
# Every external input the reproducible build depends on is pinned here. This
# file is the single source of truth read by build/sources/fetch.sh; it is
# machine-readable and hand-editable. The format and the rules for
# adding/updating a pin are documented in build/sources/README.md.
#
# FORMAT (schema 1):
#   * The file is a sequence of blocks. A block begins with a header line
#     "[<id>]" and continues with "key = value" lines until the next header or
#     end of file. Blank lines and lines beginning with "#" are ignored.
#   * Whitespace around "=" and around values is trimmed. Values never span
#     lines. Ids are unique.
#   * "kind" selects how fetch.sh treats a block:
#       file      - download <url> to <cache>/<file>; verify every hash present
#                   (sha256 and/or sha512). At least one content hash required.
#       git       - clone <url> into the cache, hard-verify HEAD == <commit>,
#                   emit the deterministic archive <archive> and verify
#                   <archive_sha256>. The commit hash is the integrity anchor.
#       container - toolchain image pins; recorded for provenance, NOT fetched
#                   (built locally by build/toolchain/build-image.sh).
#       meta      - schema/bookkeeping; not fetched.
#
# Anything not pinned here is refused by fetch.sh. Do not hand-add a source
# without a hash. See README.md "How verification failures present".
# =============================================================================

[meta]
kind        = meta
schema      = 1
milestone   = M0
description = Faithful-baseline inputs: upstream busytex (MIT) + TeX Live 2023.
# Recorded so archive-hash reproducibility is interpretable (git archive framing
# is git-version sensitive; see README). Tool versions used to compute the
# hashes below on the authoring host:
tools       = git 2.48.1, curl 8.7.1

# --- Upstream build machinery -------------------------------------------------
# busytex/busytex at the pinned commit. The commit hash is the integrity anchor
# (fetch.sh hard-verifies `git rev-parse HEAD`). archive_sha256 additionally
# pins a deterministic uncompressed tar of the checkout, produced by:
#   git archive --format=tar --prefix=busytex-<short>/ <commit>
# MIT per upstream README (upstream has no top-level LICENSE file); recorded in
# THIRD_PARTY_NOTICES.md. At M2 item 3 the machinery (vendored at M0) was forked
# into build/engines/ as our maintained build config; the derived-work per-file
# headers there name this commit, and license-audit.sh (a/b) enforces them.
# archive_sha256 framing is git-version-sensitive (README "git integrity anchor").
# Verified reproducible in the pinned container at M0 item 3: git 2.34.1 (the
# [toolchain-image] git) produces this exact hash, identical to the authoring
# host's git 2.48.1 — so no container re-pin is needed.
[busytex]
kind           = git
url            = https://github.com/busytex/busytex.git
commit         = f2bd7b11ee1b7b093638321c1f3e5d70389d307b
archive        = busytex-f2bd7b11.tar
archive_sha256 = f670beff2c3a5afb78ead20aa83d645a856513db68a0670155f0b6658df259f2
license        = MIT
comment        = upstream multicall WASM TeX build machinery; forked into build/engines/ at M2 item 3

# These are the ONLY libraries the busytex Makefile downloads outside the TL
# source tree (TL vendors harfbuzz/icu/freetype/zlib/graphite2/... itself).
# Enumerated from the Makefile at the pinned commit: URL_expat, URL_fontconfig.
[expat]
kind    = file
url     = https://github.com/libexpat/libexpat/releases/download/R_2_5_0/expat-2.5.0.tar.gz
file    = expat-2.5.0.tar.gz
sha256  = 6b902ab103843592be5e99504f846ec109c1abb692e85347587f237a4ffa1033
bytes   = 719235
license = MIT
comment = Makefile URL_expat

[fontconfig]
kind    = file
url     = https://www.freedesktop.org/software/fontconfig/release/fontconfig-2.13.96.tar.gz
file    = fontconfig-2.13.96.tar.gz
sha256  = dbabc038d41cfc3f14da1b173ae103ba7cc678efb17e091b9e801c6286b3f684
bytes   = 2133746
license = MIT-style (fontconfig)
comment = Makefile URL_fontconfig

# =============================================================================
# TL 2026 rebase inputs (M2 item 2). Added ADDITIVELY alongside the TL 2023
# blocks, which stayed byte-identical until the rebase landed; the 2023 blocks
# ([texlive-source], [texlive-iso]) were RETIRED at M2 item 9 (2026-07-24, the
# runbook 1d named-owner step) once items 3-8 were green on these pins. Their
# values remain recoverable from git history; the cached 2023 files
# (texlive-source-2023.0.tar.gz, texlive2023-20230313.iso) are no longer
# verified by fetch.sh and may be deleted from ~/.cache/wasmtex/sources at
# will. The `-2026` id suffix is KEPT (explicit year, zero churn); the next
# rebase repeats this additive pattern per docs/rebase.md Phase 1d. Nothing
# outside this lock keys off the block *id* (build scripts read the cache
# FILENAME; fetch.sh iterates ids generically and only requires uniqueness).
#
# expat/fontconfig are deliberately NOT re-pinned for 2026: they are fetched by
# the (busytex-derived) engine build, external to the TL source tree, have a
# stable API, and TL 2026 does not require newer — the existing [expat] and
# [fontconfig] blocks serve BOTH builds. (Bumping them would be speculative;
# decision journaled in docs/plans/M2-journal.md. Revisit only if item 4's build
# actually fails against them.)
# =============================================================================

# --- TeX Live 2026 engine sources ---------------------------------------------
# GitHub git-svn mirror branch refs/heads/tags/texlive-2026.0 (a *branch*, NOT a
# real git tag — the archive URL mirrors the [texlive-source] 2023 shape exactly;
# fetch.sh follows the 302 to codeload). Resolves to commit
# f26cc5ed05a1f784d1e694fe5b9cfc3ce992c03d ("texlive-2026.0 tag based on r78235",
# 2026-03-01) — the initial annual release, SAME freeze date as the ISO below.
# texlive-2026.1 (a later dvipdfmx psfile-quoting source-only fix) exists and is
# deliberately NOT taken here (keeps source tree and texmf ISO coherent at one
# freeze; see journal). GitHub on-the-fly archives are not guaranteed byte-stable;
# a sha256 mismatch means "GitHub regenerated the tarball", not corruption (README
# "Reproducibility caveats"). `commit`/`bytes` are informational (fetch.sh ignores
# extra keys); sha256 over the .tar.gz bytes is the integrity anchor.
[texlive-source-2026]
kind    = file
url     = https://github.com/TeX-Live/texlive-source/archive/refs/heads/tags/texlive-2026.0.tar.gz
file    = texlive-source-2026.0.tar.gz
sha256  = f92e1be0fe4b3ad4e596f8443c5e4e7315ecf0554c2fc153d7af52f854865e24
bytes   = 149438403
commit  = f26cc5ed05a1f784d1e694fe5b9cfc3ce992c03d
license = mixed (TeX Live source tree: Knuth/LPPL/GPL/... see THIRD_PARTY_NOTICES.md)
comment = TL2026 engine sources; branch tags/texlive-2026.0 @ r78235 (2026-03-01)

# --- TeX Live 2026 full ISO (texmf repository for install-tl) -----------------
# texlive2026-20260301.iso is the frozen TL 2026 image (same 20260301 freeze as
# the source tag above). RELEASE-YEAR EXCEPTION to the README "historic archives
# only" rule (sanctioned by the M2 ISO-availability risk): as of 2026-07 the TUG
# *historic* 2026/ dir carries only the component .tar.xz tree, not a consolidated
# ISO, so we pin the dated ISO from the CTAN release-area Images/ dir on the SAME
# proven Chemnitz host (utah fails TLS through this environment). That Images/ dir
# ROTATES when TL 2027 ships -> this url 404s then; the content hashes still fail
# closed. RE-PIN-AT-M3: switch url + checksum_url back to
# .../historic/systems/texlive/2026/texlive2026-20260301.iso once archived (the
# sha256/sha512 stay identical, so the mirror swap self-verifies). See journal.
# Re-checked 2026-07-23 (M3 item 2): historic/2026/ still has NO consolidated
# ISO (404) — reminder stands; re-check at the next milestone or TL 2027.
#
# sha512 is the mirror's own published value (.../texlive2026-20260301.iso.sha512),
# recorded so fetch.sh cross-checks every download against TUG's published value.
# sha256 is our content hash over the same bytes.
[texlive-iso-2026]
kind         = file
url          = https://ftp.tu-chemnitz.de/pub/tex/systems/texlive/Images/texlive2026-20260301.iso
file         = texlive2026-20260301.iso
sha512       = 4a9071bb567c3bdd6443378dedc8e485aea4a2f1203ec8ed7c17f6787093b9c37636a037032c0be63352e3d0bf98cf5616dab19fdcd7cb83f766b3e085b620ff
sha256       = a143d17759f08344b916ae38829b71e1ea5a2f7029e87798242a588c918469d2
bytes        = 6784798720
checksum_url = https://ftp.tu-chemnitz.de/pub/tex/systems/texlive/Images/texlive2026-20260301.iso.sha512
mirror       = CTAN release area (TU-Chemnitz Images/); historic re-pin due at M3
license      = TeX Live aggregate (per-package; see THIRD_PARTY_NOTICES.md)
comment      = frozen TL2026 image; release-area fallback per M2 ISO-availability risk

# --- Toolchain container(s) (M0 item 1; arm64 canonical re-pin M3 item 3) ------
# Recorded for provenance; NOT fetched by fetch.sh. The build runs inside the
# image built by build/toolchain/build-image.sh. The artifact-reproducibility
# anchor is image_id (it covers apt resolution AND the un-checksummed emsdk
# downloads at image-build time). ONE parameterized Dockerfile now produces BOTH
# images: it FROMs the multi-arch INDEX digest (ubuntu_index_digest, shared) and
# the build's --platform selects the per-arch base — so the two images differ
# ONLY in --platform (the invariant the three-way equivalence check needs).
# ubuntu_digest in each block is the per-arch PLATFORM digest the index resolves
# to (index -> arm64/v8, index -> amd64). Keep in sync with
# build/toolchain/Dockerfile.
#
# [toolchain-image-arm64] is the CANONICAL builder (DESIGN.md §9 amendment):
# native arm64 Linux, built with no Rosetta. [toolchain-image] is the parked
# amd64 EQUIVALENCE LANE (M3 item 6); its image_id below is the M0-era build
# (the pre-shrink 20-pkg apt set, and the old forced-amd64 Dockerfile), kept as
# the historical record — item 6 rebuilds the amd64 image from the now-shared
# parameterized Dockerfile (--platform linux/amd64) and re-pins its image_id in
# the same commit that runs the equivalence check.

[toolchain-image-arm64]
kind                = container
ubuntu_digest       = sha256:ecd3706b6b5587d1318e1777359b8563f9db6e8e5a81841f04dc3c7edbefbdc1
ubuntu_index_digest = sha256:0e0a0fc6d18feda9db1590da249ac93e8d5abfea8f4c3c0c849ce512b5ef8982
emscripten          = 3.1.43
emsdk_commit        = d9c66fa2c2cd78daeb672967b2ef12bf18adf842
emsdk_release       = bf3c159888633d232c0507f4c76cc156a43c32dc
image_id            = sha256:5d4af6533004f8d9c71857dfc9babb2c0757263410fad4af199543b9c49630dc
platform            = linux/arm64
registry_ref        = ghcr.io/bofeizhu/wasmtex-toolchain:arm64-emsdk3.1.43
registry_digest     = sha256:8d1a570a366f485d9d12fb7d23519432b628db62de76235bd9e161af162a68cd
comment             = CANONICAL builder (M3 item 3). Native arm64. ubuntu_digest = the index->arm64/v8 platform digest; the Dockerfile FROM pins ubuntu_index_digest and --platform linux/arm64 selects this. emsdk_release = the emscripten-releases hash 3.1.43 resolves to; its linux-arm64 prebuilt (wasm-binaries-arm64.tbz2, 242978805 B) is CONFIRMED present — SAME emsdk pin as [toolchain-image]/native, only the platform binaries differ (linux-arm64). image_id is the repro anchor. registry_digest (M3 item 7): the GHCR manifest digest of the SAME image bytes, pushed 2026-07-23 from the dev machine — CI pulls ghcr.io/bofeizhu/wasmtex-toolchain@registry_digest and must land on image_id.

[toolchain-image]
kind                = container
ubuntu_digest       = sha256:0d779ea97881505f5ef0039336ee85edba27519bdba968c284c86ee066a973c8
ubuntu_index_digest = sha256:0e0a0fc6d18feda9db1590da249ac93e8d5abfea8f4c3c0c849ce512b5ef8982
emscripten          = 3.1.43
emsdk_commit        = d9c66fa2c2cd78daeb672967b2ef12bf18adf842
image_id            = sha256:1b37eac1bc6f3ec5dd369aed5a65889451fe08fbe8b91f579717cb59b436dce6
platform            = linux/amd64
comment             = PARKED amd64 EQUIVALENCE LANE (M3 item 6). image_id is the M0-era build (pre-shrink apt set, old forced-amd64 Dockerfile); item 6 rebuilds from the shared Dockerfile (--platform linux/amd64) and re-pins it. ubuntu_digest = the index->amd64 platform digest.
