<!--

  Provenance: original work authored in the WasmTeX repository (see LICENSE).
    Not derived from any third-party source code. It drives the ORIGINAL §5
    `wasmtex` runtime (runtime/dist/src/index.js) through its public
    createTypesetter API — no vendored busytex glue is referenced by this page
    (M1 item 9). The vendored worker/pipeline glue scripts were dropped from
    /dist entirely at M2 item 3; our runtime's worker (/runtime/dist/worker.js)
    replaced their role. (The busytex ENGINE artifacts — busytex.js/.wasm + the
    `core` bundle (preloaded) and the `academic` bundle (mounted on demand) — are
    still loaded, by OUR worker, from /dist: they are the engine, not the retired
    glue.)

  M5 item 6: the demo drives the TIERED asset model — preload:['core'],
    onDemand:['academic']. The default document is core-only; the "siunitx units"
    example pulls the academic tier on demand at compile time (§5.4 static
    \usepackage scan), so the stats row visibly shows bundles=[core, academic]
    when it compiles. This replaces the retired `texlive-basic` byte-alias of
    core (dropped from the build at M5 item 6).

  M1 item 9: the demo migrated off the vendored glue onto the typed §5 runtime.
    The page loads the runtime as a native ES module, calls createTypesetter,
    and compiles a hello-world with XeTeX (-> xdvipdfmx) end to end. It doubles
    as the Playwright CI smoke vehicle (demo/test/smoke.spec.mjs): a real
    browser exercise of the correlated worker protocol, real Worker.terminate()
    cancellation, structured diagnostics, and a content-level PDF text proof.

  No import map needed: the runtime now ships EXPLICIT `.js` extensions on every
    internal relative specifier (`./protocol.js`, `./client.js`, `./version.js`,
    …), so native browser ESM resolves the whole module graph directly from the
    imported client — no <script type="importmap"> bridge, and no hand-maintained
    mapping to drift out of sync with the runtime's modules. (The published npm
    package loads the same way under native Node ESM.)

  Same-origin only: every asset (/dist/... engine + bundles, /runtime/dist/...
    runtime + worker, and this page) is served from one origin by
    demo/serve.mjs. No CDN, no network after asset load (DESIGN.md §10). The
    inline data: favicon suppresses a favicon request.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:," />
<title>WasmTeX demo (runtime v1)</title>

<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: #1a1a1a;
    background: #f6f6f4;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #e6e6e6; background: #17181a; }
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(128,128,128,.3);
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 650; }
  header .sub { opacity: .65; font-size: 12px; }
  #badge {
    margin-left: auto;
    font-weight: 650;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    background: #ddd; color: #333;
  }
  #badge.ok  { background: #1f9d55; color: #fff; }
  #badge.err { background: #d64545; color: #fff; }
  #badge.busy{ background: #d69e2e; color: #1a1a1a; }
  main {
    display: grid;
    grid-template-columns: minmax(300px, 1fr) minmax(300px, 1.2fr);
    gap: 14px;
    padding: 16px 20px;
  }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
  section { min-width: 0; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; opacity: .6; margin: 0 0 6px; }
  textarea, pre, iframe {
    width: 100%;
    border: 1px solid rgba(128,128,128,.35);
    border-radius: 8px;
    background: rgba(128,128,128,.06);
  }
  textarea {
    height: 170px;
    padding: 10px;
    font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    resize: vertical;
    color: inherit;
  }
  pre#log {
    height: 220px; margin: 0; padding: 10px; overflow: auto;
    font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space: pre-wrap; word-break: break-word;
  }
  iframe#preview { height: 420px; background: #fff; }
  .row { display: flex; align-items: center; gap: 10px; margin: 8px 0; flex-wrap: wrap; }
  button {
    font: inherit; font-weight: 600;
    padding: 6px 16px; border-radius: 8px;
    border: 1px solid rgba(128,128,128,.4);
    background: #2563eb; color: #fff; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  a#download { font-weight: 600; }
  a#download[aria-disabled="true"] { pointer-events: none; opacity: .4; }
  #stats { font-size: 12px; opacity: .8; margin: 4px 0; font-family: ui-monospace, monospace; }
  #diagnostics { margin: 6px 0 0; padding: 0; list-style: none; font-size: 12px; }
  #diagnostics li {
    padding: 5px 8px; margin: 4px 0; border-radius: 6px;
    border-left: 3px solid #d64545; background: rgba(214,69,69,.08);
    font-family: ui-monospace, monospace;
  }
  #diagnostics li.warning { border-left-color: #d69e2e; background: rgba(214,158,46,.08); }
  #diagnostics li.none { border-left-color: #1f9d55; background: rgba(31,157,85,.08); opacity: .75; }
</style>

<header>
  <h1>WasmTeX &middot; demo</h1>
  <span class="sub">runtime v1 &middot; createTypesetter &rarr; XeTeX &rarr; xdvipdfmx, in-browser &middot; core preloaded, academic on demand</span>
  <span id="badge" class="busy">loading&hellip;</span>
</header>

<main>
  <section>
    <h2>source</h2>
    <div class="row">
      <label for="sample" class="sub">example:</label>
      <select id="sample">
        <option value="hello">Hello, WasmTeX &mdash; core only</option>
        <option value="siunitx">siunitx units &mdash; pulls academic on demand</option>
      </select>
      <span class="sub" id="tierhint">core is preloaded; the academic tier mounts on demand when a doc needs it</span>
    </div>
    <textarea id="tex" spellcheck="false">\documentclass[11pt]{article}
\begin{document}
Hello, WasmTeX! This PDF was typeset in your browser.

Rendered by XeTeX and written to PDF by xdvipdfmx --- no server, and no
network after the initial asset load.
\end{document}
</textarea>
    <div class="row">
      <button id="compile" disabled>Compile</button>
      <span id="elapsed" class="sub">&mdash;</span>
      <a id="download" aria-disabled="true" download="hello.pdf" href="#">Download PDF</a>
    </div>
    <div id="stats">stats: &mdash;</div>
    <h2>diagnostics</h2>
    <ul id="diagnostics"><li class="none">&mdash;</li></ul>
    <h2>engine log</h2>
    <pre id="log"></pre>
  </section>

  <section>
    <h2>output.pdf</h2>
    <iframe id="preview" title="compiled PDF"></iframe>
  </section>
</main>

<script type="module">
  // ---- The ONLY module a host imports: the §5.1 client (DESIGN.md §5.1). ----
  // Native ESM import of the built runtime; its internal relative specifiers
  // carry `.js` extensions, so the browser resolves the module graph directly
  // (no import map). No vendored glue is referenced anywhere.
  import { createTypesetter, CancelledError } from '/runtime/dist/src/index.js';

  // ---- Runtime wiring (the four §5.1 options the demo needs). --------------
  const ASSETS_BASE = '/dist/';                 // engine wasm + core (preload) + academic (on-demand)
  const WORKER_URL  = '/runtime/dist/worker.js';// our classic worker (replaces the glue)
  // Tiered assets (DESIGN §5.4): `core` is preloaded at init; `academic` mounts
  // LAZILY at compile time only when a document needs it (the siunitx example).
  const BUNDLES     = { preload: ['core'], onDemand: ['academic'] };

  // The default document's body sentence — the literal the content-level PDF
  // proof reconstructs (smoke.spec.mjs). Kept in sync with the textarea above.
  // The default doc is deliberately TEXT-ONLY (one font): the smoke reconstructs
  // the visible text by decoding the XeTeX content stream through its ToUnicode
  // CMap, and multiple fonts (e.g. a math display) would need per-font CMap
  // resolution. Don't add math to the default doc without updating that proof.
  const BODY_MARKER = 'Hello, WasmTeX! This PDF was typeset in your browser.';

  // ---- Example documents (the tiering demonstration). ----------------------
  // `hello` is core-only (the default; its content proof drives the smoke).
  // `siunitx` uses an academic-only package, so compiling it mounts the academic
  // tier ON DEMAND (§5.4 static \usepackage scan) — the stats row then shows
  // bundles=[core, academic], demonstrating the preload/on-demand split live.
  const SAMPLES = {
    hello: null, // the textarea's default content (left as-authored)
    siunitx:
      '\\documentclass[11pt]{article}\n\\usepackage{siunitx}\n\\begin{document}\n' +
      'This document uses \\textsf{siunitx}, which ships in the \\textbf{academic} tier.\n' +
      'Compiling it mounts that tier on demand: the speed of light is\n' +
      '\\SI{299792458}{\\meter\\per\\second}.\n\\end{document}\n',
  };

  // ---- Test-observable state (the Playwright smoke reads these on window). --
  window.__wasmtexStatus = 'loading';
  window.__wasmtexResult = null;   // set once, when the default compile settles
  window.__wasmtexLog = '';

  const $ = (id) => document.getElementById(id);
  const badge = $('badge'), logEl = $('log'), elapsedEl = $('elapsed');
  const previewEl = $('preview'), downloadEl = $('download'), compileBtn = $('compile');
  const statsEl = $('stats'), diagEl = $('diagnostics'), texEl = $('tex'), sampleEl = $('sample');

  // Remember the default (core-only) document so switching back to "hello" restores it.
  const HELLO_SOURCE = texEl.value;
  sampleEl.addEventListener('change', () => {
    texEl.value = sampleEl.value === 'siunitx' ? SAMPLES.siunitx : HELLO_SOURCE;
  });

  function setStatus(status, label, cls) {
    window.__wasmtexStatus = status;
    badge.textContent = label;
    badge.className = cls;
  }
  function appendLog(line) {
    window.__wasmtexLog += line + '\n';
    logEl.textContent += line + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }
  function toBase64(u8) {
    let s = '';
    const CH = 0x8000;
    for (let i = 0; i < u8.length; i += CH) {
      s += String.fromCharCode.apply(null, u8.subarray(i, i + CH));
    }
    return btoa(s);
  }
  function renderStats(stats) {
    statsEl.textContent = stats
      ? `stats: passes=${stats.passes} · elapsed=${stats.elapsedMs} ms · bundles=[${stats.bundlesLoaded.join(', ')}]`
      : 'stats: —';
  }
  function renderDiagnostics(diags) {
    diagEl.textContent = '';
    if (!diags || diags.length === 0) {
      const li = document.createElement('li');
      li.className = 'none';
      li.textContent = 'no diagnostics';
      diagEl.appendChild(li);
      return;
    }
    for (const d of diags) {
      const li = document.createElement('li');
      li.className = d.severity === 'warning' ? 'warning' : 'error';
      const loc = d.file ? `${d.file}${d.line != null ? ':' + d.line : ''} — ` : '';
      li.textContent = `${d.severity}: ${loc}${d.message}`;
      diagEl.appendChild(li);
    }
  }

  // ---- One typesetter for the page; jobs serialize through it (§5.2). ------
  let typesetter = null;

  /**
   * Run one compile job and reduce it to a plain, structured-clone-safe object
   * (PDF as base64) — the shape both the visible UI and the Playwright smoke
   * consume. A TeX-level failure (bad document) RESOLVES with ok:false and
   * structured diagnostics; only a cancel/crash/fatal REJECTS (captured here).
   */
  async function compile({ engine, entry, files, source, ui }) {
    const tic = performance.now();
    let result = null, threw = null;
    try {
      const job = typesetter.typeset({ engine, entry, files });
      if (ui) job.onLog(appendLog);
      result = await job.done;
    } catch (e) {
      threw = e;
    }
    const elapsedMs = Math.round(performance.now() - tic);

    let out;
    if (threw) {
      out = {
        ok: false, exitCode: -1, size: 0, pdfBase64: null,
        diagnostics: [], stats: null, log: window.__wasmtexLog || '',
        sourceText: source ?? '', bodyMarker: BODY_MARKER, elapsedMs,
        threw: true, errorName: threw.name || 'Error',
        errorReason: (threw instanceof CancelledError) ? threw.reason : null,
        error: threw.message || String(threw),
      };
    } else {
      const pdf = result.pdf instanceof Uint8Array ? result.pdf : null;
      out = {
        ok: !!result.ok, exitCode: result.exitCode,
        size: pdf ? pdf.length : 0,
        pdfBase64: pdf ? toBase64(pdf) : null,
        diagnostics: result.diagnostics,   // Array<{severity,message,file?,line?}>
        stats: result.stats,               // {passes, elapsedMs, bundlesLoaded}
        log: result.log,
        sourceText: source ?? '', bodyMarker: BODY_MARKER, elapsedMs,
        threw: false, errorName: null, errorReason: null,
      };
      if (ui && pdf) {
        const url = URL.createObjectURL(new Blob([pdf], { type: 'application/pdf' }));
        previewEl.src = url;
        downloadEl.href = url;
        downloadEl.removeAttribute('aria-disabled');
      }
    }

    if (ui) {
      elapsedEl.textContent = (elapsedMs / 1000).toFixed(2) + ' s';
      renderStats(out.stats);
      renderDiagnostics(out.diagnostics);
      if (out.ok) setStatus('done', 'PDF ' + out.size.toLocaleString() + ' B', 'ok');
      else if (out.threw && out.errorName === 'CancelledError') setStatus('cancelled', 'cancelled', 'busy');
      else setStatus('error', 'compile failed', 'err');
      compileBtn.disabled = false;
    }
    return out;
  }

  /** Compile the textarea document with XeTeX and publish window.__wasmtexResult. */
  async function compileDefault() {
    const source = texEl.value;
    window.__wasmtexResult = null;
    window.__wasmtexLog = '';
    logEl.textContent = '';
    elapsedEl.textContent = '—';
    compileBtn.disabled = true;
    downloadEl.setAttribute('aria-disabled', 'true');
    setStatus('compiling', 'compiling…', 'busy');
    const out = await compile({ engine: 'xetex', entry: 'hello.tex', files: { 'hello.tex': source }, source, ui: true });
    window.__wasmtexResult = out;
    return out;
  }

  /** Boot the typesetter once (init: fetch assets.json, spawn worker, load engine + bundle). */
  async function boot() {
    setStatus('initializing', 'initializing…', 'busy');
    typesetter = await createTypesetter({
      assetsBaseUrl: ASSETS_BASE,
      workerUrl: WORKER_URL,
      bundles: BUNDLES,
    });
    compileBtn.disabled = false;
  }

  // ---- Programmatic surface for the Playwright smoke (headless drives). ----
  // Job objects can't cross page.evaluate serialization, so the page owns the
  // job lifecycle and hands back plain results. `run` compiles any doc/engine;
  // `cancelProbe` exercises real Worker.terminate() cancellation (§5.2).
  window.__wasmtex = {
    ready: null,
    async run({ engine, entry, files }) {
      return compile({ engine, entry, files, source: files[entry] ?? '', ui: false });
    },
    async cancelProbe({ engine, entry, files }) {
      const tic = performance.now();
      const job = typesetter.typeset({ engine, entry, files });
      job.cancel();                         // immediate: terminates the worker mid-flight
      let out;
      try {
        await job.done;
        out = { rejected: false, errorName: null, reason: null };
      } catch (e) {
        out = {
          rejected: true,
          errorName: e.name || 'Error',
          reason: (e instanceof CancelledError) ? e.reason : null,
        };
      }
      out.elapsedMs = Math.round(performance.now() - tic);
      return out;
    },
  };

  // Safety net: an uncaught boot/compile failure must SURFACE (fail the smoke),
  // never hang it. If nothing has settled, publish a failed result.
  function surfaceFatal(message) {
    setStatus('error', 'error', 'err');
    if (window.__wasmtexResult === null) {
      window.__wasmtexResult = {
        ok: false, exitCode: -1, size: 0, pdfBase64: null,
        diagnostics: [], stats: null, log: window.__wasmtexLog || '',
        sourceText: texEl ? texEl.value : '', bodyMarker: BODY_MARKER,
        elapsedMs: 0, threw: true, errorName: 'BootError', errorReason: null,
        error: message,
      };
    }
  }

  compileBtn.addEventListener('click', () => { void compileDefault(); });

  // Boot, then auto-compile the default document unless `?manual=1` (the
  // cancellation smoke drives a clean, idle typesetter itself).
  const manual = new URLSearchParams(location.search).has('manual');
  window.__wasmtex.ready = boot();
  try {
    await window.__wasmtex.ready;
    if (!manual) await compileDefault();
  } catch (e) {
    surfaceFatal(e && e.message ? e.message : String(e));
    throw e;
  }
</script>
